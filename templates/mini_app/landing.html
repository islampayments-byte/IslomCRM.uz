<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ org.org_name }} - IslomCRM Mini App</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Brand colors - Fixed for permanent Premium Dark Mode */
            --accent: #8e2de2;
            --accent-light: #4a00e0;
            --accent-gradient: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
            --bg-deep: #0f1014;
            /* Deep, rich dark */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(circle at 50% -20%, rgba(142, 45, 226, 0.15), transparent),
                radial-gradient(circle at 0% 100%, rgba(74, 0, 224, 0.05), transparent);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* No scroll on landing */
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Hero Styling */
        .hero-section {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--accent);
            border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s linear infinite;
            opacity: 0.3;
        }

        .logo-box {
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 15px 35px rgba(142, 45, 226, 0.4);
            z-index: 2;
        }

        @keyframes morph {

            0%,
            100% {
                border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%;
                transform: rotate(0deg);
            }

            33% {
                border-radius: 65% 35% 30% 70% / 70% 70% 30% 30%;
            }

            66% {
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            }
        }

        h1 {
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Status Indicator */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .dots-loader {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.2;
            animation: dot-pulse 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            border: 1px solid var(--glass-border);
        }

        /* Buttons Section */
        .actions-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-premium {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 22px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid transparent;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 10px 40px rgba(142, 45, 226, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 5px 20px rgba(142, 45, 226, 0.3);
        }

        .btn-secondary {
            background: var(--glass);
            color: #fff;
            border-color: var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.97);
        }

        .btn-premium i {
            font-size: 22px;
        }

        /* Footer Branding */
        .footer-logo {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            opacity: 0.2;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Entrance Animations */
        .anim-slide-up {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }

        .delay-3 {
            animation-delay: 0.6s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Hero Section -->
        <div class="hero-section anim-slide-up">
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-box">
                    {% if org.org_logo %}
                    <img src="{{ url_for('static', filename=org.org_logo) }}" alt="Logo"
                        style="width: 100%; height: 100%; border-radius: 30px; object-fit: cover;">
                    {% else %}
                    <i class='bx bx-mobile-alt'></i>
                    {% endif %}
                </div>
            </div>
            <h1>{{ org.yandex_park_name or org.org_name }}</h1>
        </div>

        <!-- Actions -->
        <div class="actions-grid anim-slide-up delay-2">
            <a href="javascript:void(0)" class="btn-premium btn-primary" onclick="openLoginModal()">
                <i class='bx bx-log-in-circle'></i>
                <span>Tizimga kirish</span>
            </a>
            <a href="javascript:void(0)" class="btn-premium btn-secondary" onclick="webApp.showAlert('Tez kunda!')">
                <i class='bx bx-user-plus'></i>
                <span>Ro'yxatdan o'tish</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer-logo anim-slide-up delay-3">
            ISLAM PAYMENTS &copy; 2026
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Kirish</h3>
                <button onclick="closeLoginModal()" class="close-btn"><i class='bx bx-x'></i></button>
            </div>
            
            <!-- Step 1: Phone -->
            <div id="step-phone" class="auth-step active">
                <p class="modal-desc">Telefon raqamingizni kiriting</p>
                <div class="input-wrapper">
                    <span class="prefix">+998</span>
                    <input type="tel" id="driverPhone" placeholder="90 123 45 67" maxlength="12" oninput="formatPhone(this)">
                </div>
                <button onclick="checkDriver()" id="checkBtn" class="btn-premium btn-primary w-100 mt-4">
                    <span>Davom etish</span>
                </button>
            </div>

            <!-- Step 2: SMS Code -->
            <div id="step-sms" class="auth-step">
                <p class="modal-desc">Sizga yuborilgan 6 xonali kodni kiriting</p>
                <div class="sms-code-wrapper">
                    <input type="number" id="smsCode" placeholder="000000" maxlength="6">
                </div>
                <button onclick="verifyCode()" id="verifyBtn" class="btn-premium btn-primary w-100 mt-4">
                    <span>Tasdiqlash</span>
                </button>
            </div>
        </div>
    </div>

    <style>
        .w-100 { width: 100%; }
        .mt-4 { margin-top: 20px; }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-content {
            background: var(--bg-deep);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 { margin: 0; font-size: 20px; }
        .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
        
        .modal-desc { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; text-align: center; }
        
        .auth-step { display: none; }
        .auth-step.active { display: block; }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
        }
        .prefix { font-weight: 700; color: var(--accent); margin-right: 10px; }
        .input-wrapper input {
            background: none;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 18px;
            outline: none;
            font-family: inherit;
        }
        
        .sms-code-wrapper input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            color: var(--accent);
            outline: none;
        }
    </style>

    <script>
        const webApp = window.Telegram.WebApp;
        if (webApp.expand) webApp.expand(); // Full height
        webApp.ready();

        function haptic(type = 'medium') {
            try {
                if (webApp.HapticFeedback) {
                    webApp.HapticFeedback.impactOccurred(type);
                }
            } catch(e) {}
        }

        function safeAlert(msg) {
            try {
                if (webApp.showAlert) {
                    webApp.showAlert(msg);
                } else {
                    alert(msg);
                }
            } catch(e) {
                alert(msg);
            }
        }

        function openLoginModal() {
            haptic();
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            // Reset to step 1
            document.getElementById('step-phone').classList.add('active');
            document.getElementById('step-sms').classList.remove('active');
        }

        function formatPhone(input) {
            let val = input.value.replace(/\D/g, '');
            if (val.startsWith('998')) val = val.substring(3);
            input.value = val.substring(0, 9);
        }

        async function checkDriver() {
            haptic();
            const phone = document.getElementById('driverPhone').value;
            if (phone.length < 9) {
                webApp.showAlert('Telefon raqamini to\'liq kiriting');
                return;
            }

            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i>";

            try {
                const res = await fetch(window.location.pathname + '/check-driver', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: '+998' + phone })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    // Switch to SMS step
                    document.getElementById('step-phone').classList.remove('active');
                    document.getElementById('step-sms').classList.add('active');
                    btn.disabled = false;
                    btn.innerHTML = "<span>Davom etish</span>";
                } else {
                    safeAlert(data.message);
                    btn.disabled = false;
                    btn.innerHTML = "<span>Davom etish</span>";
                }
            } catch (err) {
                safeAlert('Xatolik yuz berdi');
                btn.disabled = false;
                btn.innerHTML = "<span>Davom etish</span>";
            }
        }

        async function verifyCode() {
            haptic();
            const code = document.getElementById('smsCode').value;
            const phone = document.getElementById('driverPhone').value;
            if (code.length < 6) {
                safeAlert('Tasdiqlash kodini kiriting');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i>";

            try {
                const res = await fetch(window.location.pathname + '/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: '+998' + phone, code: code })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    safeAlert('Kirish muvaffaqiyatli!');
                    window.location.href = data.redirect;
                } else {
                    safeAlert(data.message);
                    btn.disabled = false;
                    btn.innerHTML = "<span>Tasdiqlash</span>";
                }
            } catch (err) {
                safeAlert('Xatolik yuz berdi');
                btn.disabled = false;
                btn.innerHTML = "<span>Tasdiqlash</span>";
            }
        }
    </script>
</body>

</html>
