<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ org.org_name }} - IslomCRM Mini App</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --accent: #8e2de2;
            --accent-light: #4a00e0;
            --accent-gradient: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
            --bg-deep: #08090a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(142, 45, 226, 0.15), transparent),
                radial-gradient(circle at 0% 100%, rgba(74, 0, 224, 0.05), transparent);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No scroll on landing */
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Hero Styling */
        .hero-section {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--accent);
            border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s linear infinite;
            opacity: 0.3;
        }

        .logo-box {
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 15px 35px rgba(142, 45, 226, 0.4);
            z-index: 2;
        }

        @keyframes morph {
            0%, 100% { border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg); }
            33% { border-radius: 65% 35% 30% 70% / 70% 70% 30% 30%; }
            66% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        h1 {
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Status Indicator */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .dots-loader {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.2;
            animation: dot-pulse 1.4s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            border: 1px solid var(--glass-border);
        }

        /* Buttons Section */
        .actions-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-premium {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 22px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid transparent;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 10px 40px rgba(142, 45, 226, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 5px 20px rgba(142, 45, 226, 0.3);
        }

        .btn-secondary {
            background: var(--glass);
            color: #fff;
            border-color: var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:active {
            background: rgba(255,255,255,0.08);
            transform: scale(0.97);
        }

        .btn-premium i { font-size: 22px; }

        /* Footer Branding */
        .footer-logo {
            padding: 30px 0;
            opacity: 0.3;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Entrance Animations */
        .anim-slide-up {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <div class="hero-section anim-slide-up">
            <div class="logo-wrapper">
                <div class="logo-ring"></div>
                <div class="logo-box">
                    {% if org.org_logo %}
                        <img src="{{ url_for('static', filename=org.org_logo) }}" alt="Logo" style="width: 100%; height: 100%; border-radius: 30px; object-fit: cover;">
                    {% else %}
                        <i class='bx bx-mobile-alt'></i>
                    {% endif %}
                </div>
            </div>
            <h1>{{ org.yandex_park_name or org.org_name }}</h1>
            <p class="subtitle">IslomCRM platformasining rasmiy Mini App interfeysiga xush kelibsiz.</p>
        </div>

        <!-- Loading / Status -->
        <div class="loading-wrap anim-slide-up delay-1">
            <div class="dots-loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="status-badge">Tizim tayyorlanmoqda</div>
        </div>

        <!-- Actions -->
        <div class="actions-grid anim-slide-up delay-2">
            <a href="{{ url_for('auth.login') }}" class="btn-premium btn-primary">
                <i class='bx bx-log-in-circle'></i>
                <span>Tizimga kirish</span>
            </a>
            <a href="{{ url_for('auth.register') }}" class="btn-premium btn-secondary">
                <i class='bx bx-user-plus'></i>
                <span>Ro'yxatdan o'tish</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer-logo anim-slide-up delay-3">
            IslomCRM &copy; 2026
        </div>
    </div>

    <!-- Haptic Feedback emulation or interaction enhancements could go here -->
</body>
</html>
