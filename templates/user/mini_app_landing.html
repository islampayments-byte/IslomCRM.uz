<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ org.org_name }} - Mini App</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #8e2de2;
            --bg: #0f1014;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .landing-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .logo-box {
            width: 80px; height: 80px; background: var(--primary);
            border-radius: 20px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; box-shadow: 0 10px 20px rgba(142,45,226,0.3);
        }
        h1 { margin: 0 0 10px; font-size: 24px; font-weight: 800; }
        p { color: rgba(255,255,255,0.5); font-size: 15px; margin-bottom: 30px; }
        .loading-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; opacity: 0.3; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        .status-tag {
            display: inline-block; padding: 6px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            font-size: 12px; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="landing-card">
        <div class="logo-box">
            <i class='bx bx-mobile-alt'></i>
        </div>
        <h1>{{ org.org_name }}</h1>
        <p>Mini App tizimi yuklanmoqda...</p>
        
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="status-tag">Yaqin kunda</div>
    </div>
</body>
</html>
