<!-- Sidebar - Modern Slim -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='favicon.png') }}" class="logo-img" alt="Logo">
            <span>ISLOM CRM</span>
        </div>
    </div>

    <ul class="nav-links">
        {% if current_user.role == 'admin' %}
            {# ADMIN SIDEBAR #}
            <li>
                <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint == 'admin.dashboard' }}">
                    <i class='bx bx-grid-alt'></i>
                    <span class="link_name">Statistika</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('admin.users_list') }}" class="{{ 'active' if request.endpoint == 'admin.users_list' }}">
                    <i class='bx bx-user'></i>
                    <span class="link_name">Foydalanuvchilar</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('admin.settings') }}" class="{{ 'active' if request.endpoint == 'admin.settings' }}">
                    <i class='bx bx-cog'></i>
                    <span class="link_name">Sozlamalar</span>
                </a>
            </li>
        {% else %}
            {# USER SIDEBAR #}
            <li>
                <a href="{{ url_for('user.dashboard') }}" class="{{ 'active' if request.endpoint == 'user.dashboard' }}">
                    <i class='bx bx-grid-alt'></i>
                    <span class="link_name">Asosiy</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('user.finance') }}" class="{{ 'active' if request.endpoint == 'user.finance' }}">
                    <i class='bx bx-wallet'></i>
                    <span class="link_name">Moliya</span>
                </a>
            </li>
            <li>
                <a href="#" class="{{ 'active' if request.endpoint == 'user.drivers' }}">
                    <i class='bx bx-user'></i>
                    <span class="link_name">Haydovchilar</span>
                </a>
            </li>
            <li>
                <a href="#" class="{{ 'active' if request.endpoint == 'user.reports' }}">
                    <i class='bx bx-file'></i>
                    <span class="link_name">Hisobotlar</span>
                </a>
            </li>
            <li>
                <a href="#" class="{{ 'active' if request.endpoint == 'user.map' }}">
                    <i class='bx bx-map-alt'></i>
                    <span class="link_name">Xarita</span>
                </a>
            </li>
        {% endif %}
    </ul>

    <div style="margin-top: auto; padding-bottom: 20px;">
        <ul class="nav-links">
            <li>
                <a href="{{ url_for('auth.logout') }}" style="color: var(--danger);">
                    <i class='bx bx-log-out'></i>
                    <span class="link_name">Chiqish</span>
                </a>
            </li>
        </ul>
    </div>
</aside>
