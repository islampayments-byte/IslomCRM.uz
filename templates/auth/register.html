<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IslomCRM | Ro'yxatdan o'tish</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .mesh-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 100% 0%, #1e293b 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #172554 0%, transparent 50%);
            background-color: #020617;
            filter: blur(20px); /* Performance fix */
            opacity: 0.9;
        }

        /* Animation removed for speed */

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            position: relative;
            z-index: 10;
            background: rgba(30, 41, 59, 0.82);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-logo-container {
            width: 70px;
            height: 70px;
            background: rgba(255, 204, 0, 0.15);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .auth-logo-container img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
        }

        .input-wrapper label {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
            pointer-events: none;
            transition: var(--transition);
        }

        .input-wrapper input:focus + label,
        .input-wrapper input:not(:placeholder-shown) + label {
            top: 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-color);
            background: #0f172a;
            padding: 0 8px;
            transform: translateY(-50%) translateX(-4px);
        }

        .btn-premium {
            width: 100%;
            background: var(--primary-color);
            color: #000;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 16px rgba(255, 204, 0, 0.2);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            background: #ffdb4d;
        }

        .auth-footer {
            margin-top: 24px;
            color: #64748b;
            font-size: 13px;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="login-card glass-card">
        <div class="auth-logo-container">
            <img src="{{ url_for('static', filename='favicon.png') }}" alt="Logo">
        </div>
        <h1 class="auth-title">Ro'yxatdan o'tish</h1>
        <p class="auth-subtitle">Yangi hisob yarating va platformadan foydalaning</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="input-wrapper">
                <input type="text" name="phone" id="phone" value="+998" maxlength="13" required placeholder=" ">
                <label>Telefon raqam</label>
            </div>

            <div class="input-wrapper">
                <input type="password" name="pin" id="pin" maxlength="6" required placeholder=" ">
                <label>6 xonali PIN kod</label>
            </div>

            <button type="submit" class="btn-premium">Ro'yxatdan o'tish</button>
        </form>

        <div class="auth-footer">
            Hisobingiz bormi? <a href="{{ url_for('auth.login') }}">Kirish</a>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phone');
        const form = document.querySelector('form');

        phoneInput.addEventListener('input', function() {
            let val = this.value.replace(/\D/g, ''); 
            if (!val.startsWith('998')) {
                val = '998' + val;
            }
            val = val.substring(0, 12);
            
            let formatted = '+998';
            if (val.length > 3) formatted += ' ' + val.substring(3, 5);
            if (val.length > 5) formatted += ' ' + val.substring(5, 8);
            if (val.length > 8) formatted += ' ' + val.substring(8, 10);
            if (val.length > 10) formatted += ' ' + val.substring(10, 12);
            
            this.value = formatted;
        });

        form.addEventListener('submit', function(e) {
            const purePhone = phoneInput.value.replace(/\s/g, '');
            if (purePhone.length !== 13) {
                e.preventDefault();
                alert("Iltimos, telefon raqamini to'liq kiriting (+998 va 9 ta raqam)");
                return;
            }
            // Strip spaces before sending to backend
            phoneInput.value = purePhone;
        });
    </script>
</body>
</html>
